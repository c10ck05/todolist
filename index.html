<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투두리스트</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f9f9f9; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .input-group { display: flex; margin-bottom: 20px; }
        .auth-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .row-group { display: flex; gap: 8px; }
        .row-group input { flex: 1; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 14px; }
        .btn { padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .btn-primary { background-color: #4CAF50; }
        .btn-secondary { background-color: #2196F3; }
        .btn-info { background-color: #ff9800; font-size: 13px; white-space: nowrap; padding: 10px; }
        .btn-info:disabled { background-color: #cca46a; cursor: not-allowed; }
        .btn-danger { background-color: #ff4d4d; padding: 5px 10px; font-size: 12px; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .hidden { display: none !important; }
        .header-box { display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background-color: #aaa; font-size: 11px; padding: 5px; }
        .switch-link { text-align: center; font-size: 13px; color: #666; margin-top: 15px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <h2>🔑 로그인</h2>
    <div class="auth-group">
        <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="username">
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
        <button class="btn btn-primary" onclick="handleLogin()">로그인</button>
    </div>
    <div class="switch-link" onclick="showRegisterSection()">아직 계정이 없으신가요? 회원가입 하러가기</div>
    <div class="switch-link" style="color: #e91e63; margin-top: 8px;" onclick="showResetSection()">비밀번호를 잃어버리셨나요?</div>
</div>

<div id="registerSection" class="container hidden">
    <h2>📝 회원가입</h2>
    <div class="auth-group">
        <input type="text" id="regId" placeholder="원하는 아이디 입력" autocomplete="off">
        <input type="password" id="regPw" placeholder="비밀번호 입력" autocomplete="new-password">
        <input type="password" id="regPwConfirm" placeholder="비밀번호 재입력 확인" autocomplete="new-password">
        
        <div class="row-group">
            <input type="email" id="regEmail" placeholder="이메일 입력 (인증용)" autocomplete="email">
            <button class="btn btn-info" onclick="handleRequestCode(event)">인증 요청</button>
        </div>
        
        <input type="text" id="regCode" placeholder="이메일로 받은 인증번호 6자리" autocomplete="one-time-code">
        <button class="btn btn-secondary" onclick="handleRegister()">인증 및 가입 완료</button>
    </div>
    <div class="switch-link" onclick="showLoginSection()">이미 계정이 있나요? 로그인 하러가기</div>
</div>

<div id="resetSection" class="container hidden">
    <h2>🔒 비밀번호 재설정</h2>
    <div class="auth-group">
        <p style="font-size: 12px; color: #666; margin: 0 0 5px 0; text-align: center;">가입할 때 사용한 이메일로 인증을 진행해 주세요.</p>
        
        <div class="row-group">
            <input type="email" id="resetEmail" placeholder="가입했던 이메일 입력" autocomplete="email">
            <button class="btn btn-info" onclick="handleRequestResetCode(event)">인증 요청</button>
        </div>
        
        <input type="text" id="resetCode" placeholder="이메일로 받은 인증번호 6자리" autocomplete="one-time-code">
        <input type="password" id="resetNewPw" placeholder="새로운 비밀번호 입력" autocomplete="new-password">
        <input type="password" id="resetNewPwConfirm" placeholder="새로운 비밀번호 확인" autocomplete="new-password">
        
        <button class="btn btn-danger" onclick="handleResetPassword()">비밀번호 변경 완료</button>
    </div>
    <div class="switch-link" onclick="showLoginSection()">로그인 화면으로 돌아가기</div>
</div>

<div id="todoSection" class="container hidden">
    <div class="header-box">
        <h2>📝 나의 투두리스트</h2>
        <button class="btn btn-logout" onclick="handleLogout()">로그아웃</button>
    </div>
    
    <div class="input-group" style="width: 100%;">
        <input type="text" id="todoInput" placeholder="새로운 할 일을 입력하세요..." style="flex: 1; border-radius: 4px 0 0 4px;">
        <button class="btn btn-primary" onclick="addTodo()" style="border-radius: 0 4px 4px 0;">등록</button>
    </div>
    
    <ul id="todoList"></ul>
</div>

<script>
    const BACKEND_URL = "http://127.0.0.1:8000";

    window.onload = function() {
        const token = localStorage.getItem("token");
        if (token) {
            showTodoSection();
            loadTodos();
        } else {
            showLoginSection();
        }
    };

    // 모든 입력창 청소 함수
    function clearAllInputs() {
        document.getElementById("loginId").value = "";
        document.getElementById("loginPw").value = "";
        
        document.getElementById("regId").value = "";
        document.getElementById("regPw").value = "";
        document.getElementById("regPwConfirm").value = "";
        document.getElementById("regEmail").value = "";
        document.getElementById("regCode").value = "";
        
        document.getElementById("resetEmail").value = "";
        document.getElementById("resetCode").value = "";
        document.getElementById("resetNewPw").value = "";
        document.getElementById("resetNewPwConfirm").value = "";
    }

    // 화면 전환 함수들
    function showLoginSection() {
        clearAllInputs();
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("registerSection").classList.add("hidden");
        document.getElementById("resetSection").classList.add("hidden");
        document.getElementById("todoSection").classList.add("hidden");
    }
    function showRegisterSection() {
        clearAllInputs();
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("registerSection").classList.remove("hidden");
        document.getElementById("resetSection").classList.add("hidden");
        document.getElementById("todoSection").classList.add("hidden");
    }
    function showResetSection() {
        clearAllInputs();
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("registerSection").classList.add("hidden");
        document.getElementById("resetSection").classList.remove("hidden");
        document.getElementById("todoSection").classList.add("hidden");
    }
    function showTodoSection() {
        clearAllInputs();
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("registerSection").classList.add("hidden");
        document.getElementById("resetSection").classList.add("hidden");
        document.getElementById("todoSection").classList.remove("hidden");
    }

    // 회원가입용 인증 요청
    async function handleRequestCode(event) {
        const email = document.getElementById("regEmail").value;
        if (!email) { alert("이메일을 입력해 주세요."); return; }

        const targetBtn = event.target;
        targetBtn.disabled = true;
        targetBtn.innerText = "보내는 중...";

        try {
            const response = await fetch(`${BACKEND_URL}/request-code`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email })
            });
            const data = await response.json();
            if (response.ok) {
                alert(data.message || "인증번호가 발송되었습니다.");
            } else {
                alert("실패: " + (data.detail || "오류가 발생했습니다."));
            }
        } catch (error) {
            alert("네트워크 통신 중 오류가 발생했습니다.");
        } finally {
            targetBtn.disabled = false;
            targetBtn.innerText = "인증 요청";
        }
    }

    // 회원가입 완료
    async function handleRegister() {
        const username = document.getElementById("regId").value;
        const password = document.getElementById("regPw").value;
        const passwordConfirm = document.getElementById("regPwConfirm").value;
        const email = document.getElementById("regEmail").value;
        const code = document.getElementById("regCode").value;

        if (!username || !password || !passwordConfirm || !email || !code) {
            alert("모든 필드를 다 입력해 주세요.");
            return;
        }

        if (password !== passwordConfirm) {
            alert("입력하신 두 비밀번호가 서로 다릅니다. 다시 확인해 주세요.");
            return;
        }

        const response = await fetch(`${BACKEND_URL}/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, email, code })
        });

        if (response.ok) {
            alert("회원가입 성공! 로그인 화면으로 이동합니다.");
            showLoginSection();
        } else {
            const data = await response.json();
            alert("회원가입 실패: " + data.detail);
        }
    }

    // 비밀번호 재설정용 인증번호 요청
    async function handleRequestResetCode(event) {
        const email = document.getElementById("resetEmail").value;
        if (!email) { alert("이메일을 입력해 주세요."); return; }

        const targetBtn = event.target;
        targetBtn.disabled = true;
        targetBtn.innerText = "보내는 중...";

        try {
            const response = await fetch(`${BACKEND_URL}/request-reset-code`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email })
            });
            const data = await response.json();
            if (response.ok) {
                alert(data.message || "인증번호가 발송되었습니다.");
            } else {
                alert("실패: " + (data.detail || "오류가 발생했습니다."));
            }
        } catch (error) {
            alert("네트워크 통신 중 오류가 발생했습니다.");
        } finally {
            targetBtn.disabled = false;
            targetBtn.innerText = "인증 요청";
        }
    }

    // 비밀번호 변경 완료
    async function handleResetPassword() {
        const email = document.getElementById("resetEmail").value;
        const code = document.getElementById("resetCode").value;
        const new_password = document.getElementById("resetNewPw").value;
        const new_password_confirm = document.getElementById("resetNewPwConfirm").value;

        if (!email || !code || !new_password || !new_password_confirm) {
            alert("모든 필드를 다 입력해 주세요.");
            return;
        }

        if (new_password !== new_password_confirm) {
            alert("새 비밀번호와 비밀번호 확인이 일치하지 않습니다.");
            return;
        }

        // 💡 주소 꼬임 방지를 위해 라우터 주소를 완전히 /reset-password로 매칭
        const response = await fetch(`${BACKEND_URL}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, code, new_password })
        });

        const data = await response.json();
        if (response.ok) {
            alert("비밀번호가 성공적으로 변경되었습니다! 변경된 비밀번호로 로그인하세요.");
            showLoginSection();
        } else {
            alert("변경 실패: " + data.detail);
        }
    }

    // 로그인
    async function handleLogin() {
        const username = document.getElementById("loginId").value;
        const password = document.getElementById("loginPw").value;
        const response = await fetch(`${BACKEND_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (response.ok) {
            localStorage.setItem("token", data.access_token);
            showTodoSection();
            loadTodos();
        } else { alert("로그인 실패: " + data.detail); }
    }

    // 로그아웃
    function handleLogout() {
        localStorage.removeItem("token");
        document.getElementById("todoList").innerHTML = "";
        showLoginSection();
    }

    function getAuthHeader() { return { "Authorization": `Bearer ${localStorage.getItem("token")}` }; }

    async function loadTodos() {
        const response = await fetch(`${BACKEND_URL}/todos`, { headers: getAuthHeader() });
        if (response.ok) {
            const todos = await response.json();
            todos.forEach(todo => appendTodoItem(todo.id, todo.content));
        }
    }

    async function addTodo() {
        const input = document.getElementById("todoInput");
        const content = input.value;
        if (!content) return;
        const response = await fetch(`${BACKEND_URL}/todos`, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...getAuthHeader() },
            body: JSON.stringify({ content: content })
        });
        const data = await response.json();
        if (response.ok) { appendTodoItem(data.id, data.content); input.value = ""; }
    }

    async function deleteTodo(id) {
        const response = await fetch(`${BACKEND_URL}/todos/${id}`, { method: "DELETE", headers: getAuthHeader() });
        if (response.ok) document.getElementById(`todo-${id}`).remove();
    }

    function appendTodoItem(id, content) {
        const list = document.getElementById("todoList");
        const li = document.createElement("li");
        li.id = `todo-${id}`;
        li.innerHTML = `<span>${content}</span><button class="btn btn-danger" onclick="deleteTodo(${id})">X</button>`;
        list.appendChild(li);
    }
</script>
</body>
</html>
