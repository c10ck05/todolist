<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
    <style>
        :root {
            --bg: #f3f2ef;
            --card-bg: #ffffff;
            --text-primary: #1d2226;
            --text-secondary: #56687a;
            --input-border: #8896a4;
            --input-border-focus: #0a66c2;
            --input-bg: #ffffff;
            --btn-primary: #0a66c2;
            --btn-primary-hover: #004182;
            --btn-primary-text: #ffffff;
            --link-color: #0a66c2;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.15);
            --divider: #e0e0e0;
            --alert-error-bg: #fff0f0;
            --alert-error-color: #cc1016;
            --alert-error-border: #ffd0d0;
            --alert-success-bg: #f0faf0;
            --alert-success-color: #057642;
            --alert-success-border: #c6f0d8;
            --todo-item-bg: #f8f9fa;
            --todo-item-border: #e2e8f0;
            --todo-item-hover: #eef3f8;
            --tab-active-bg: #0a66c2;
            --tab-border: #0a66c2;
            --logout-bg: #fff0f0;
            --logout-color: #cc1016;
            --logout-border: #ffd0d0;
            --spinner-color: rgba(255,255,255,0.5);
            --overdue-bg: #fff4e5;
            --overdue-border: #f59e0b;
            --overdue-text: #92400e;
            --deadline-chip-bg: #e0f2fe;
            --deadline-chip-color: #0369a1;
            --deadline-picker-bg: #f0f7ff;
            --timeline-line: #cbd5e1;
            --timeline-dot: #0a66c2;
            --timeline-dot-overdue: #ef4444;
            --timeline-dot-today: #f59e0b;
            --timeline-dot-done: #10b981;
        }
        [data-theme="dark"] {
            --bg: #1b1f23;
            --card-bg: #283339;
            --text-primary: #e7e9ea;
            --text-secondary: #8b9197;
            --input-border: #546474;
            --input-border-focus: #70b5f9;
            --input-bg: #1e2a32;
            --btn-primary: #70b5f9;
            --btn-primary-hover: #9ecfff;
            --btn-primary-text: #1b1f23;
            --link-color: #70b5f9;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.5);
            --divider: #38434f;
            --alert-error-bg: #3d1f1f;
            --alert-error-color: #ff6b6b;
            --alert-error-border: #5c2a2a;
            --alert-success-bg: #1a3a2a;
            --alert-success-color: #5cc97e;
            --alert-success-border: #2a5c3a;
            --todo-item-bg: #1e2a32;
            --todo-item-border: #38434f;
            --todo-item-hover: #253340;
            --tab-active-bg: #70b5f9;
            --tab-border: #70b5f9;
            --logout-bg: #3d1f1f;
            --logout-color: #ff6b6b;
            --logout-border: #5c2a2a;
            --overdue-bg: #2d1f0a;
            --overdue-border: #d97706;
            --overdue-text: #fcd34d;
            --deadline-chip-bg: #1e3a4a;
            --deadline-chip-color: #7dd3fc;
            --deadline-picker-bg: #1a2a38;
            --timeline-line: #38434f;
            --timeline-dot: #70b5f9;
            --timeline-dot-overdue: #f87171;
            --timeline-dot-today: #fbbf24;
            --timeline-dot-done: #34d399;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            transition: background 0.3s, color 0.3s;
        }
        .section {
            display: none;
            width: 100%;
            max-width: 500px;
            flex-direction: column;
            align-items: center;
        }
        .section.active { display: flex; }
        #section-todo { max-width: 620px; }
        .theme-toggle {
            position: fixed;
            top: 20px; right: 20px;
            width: 44px; height: 44px;
            border-radius: 50%; border: none;
            background: var(--card-bg);
            box-shadow: var(--card-shadow);
            cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; z-index: 999;
        }
        .theme-toggle:hover { transform: scale(1.1); }
        .logo-wrap { margin-bottom: 20px; text-align: left; width: 100%; }
        .logo { display: inline-flex; align-items: center; gap: 4px; }
        .logo-text { font-size: 32px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; }
        .logo-badge { background: var(--btn-primary); color: var(--btn-primary-text); font-size: 18px; font-weight: 800; padding: 2px 8px 4px; border-radius: 4px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 36px 36px 32px;
            width: 100%;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
            animation: fadeIn 0.35s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
        .card-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.5px; }
        .card-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
        .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; display: none; border: 1px solid; }
        .alert-error { background: var(--alert-error-bg); color: var(--alert-error-color); border-color: var(--alert-error-border); }
        .alert-success { background: var(--alert-success-bg); color: var(--alert-success-color); border-color: var(--alert-success-border); }
        .input-wrap { position: relative; margin-bottom: 14px; width: 100%; }
        .input-wrap input {
            width: 100%; padding: 15px 18px;
            border: 1px solid var(--input-border); border-radius: 8px;
            font-size: 16px; color: var(--text-primary); background: var(--input-bg);
            outline: none; transition: all 0.2s;
            -webkit-appearance: none; appearance: none; display: block;
        }
        .input-wrap input::placeholder { color: var(--text-secondary); }
        .input-wrap input:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px rgba(10,102,194,0.12); }
        .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--link-color); font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px; }
        .pw-toggle:hover { text-decoration: underline; }
        .email-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 14px; width: 100%; }
        .email-row .input-wrap { flex: 1; margin-bottom: 0; min-width: 0; }
        .btn-verify { flex-shrink: 0; padding: 0 18px; background: var(--card-bg); color: var(--link-color); border: 1px solid var(--link-color); border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .btn-verify:hover:not(:disabled) { background: var(--todo-item-hover); }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }
        .link-blue { color: var(--link-color); font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; display: inline-block; margin-bottom: 16px; }
        .link-blue:hover { text-decoration: underline; }
        .btn-main { width: 100%; padding: 15px; background: var(--btn-primary); color: var(--btn-primary-text); border: none; border-radius: 30px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; -webkit-appearance: none; display: block; }
        .btn-main:hover:not(:disabled) { background: var(--btn-primary-hover); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        .below-card { margin-top: 20px; font-size: 15px; color: var(--text-secondary); text-align: center; width: 100%; }
        .below-card a { color: var(--link-color); font-weight: 700; text-decoration: none; cursor: pointer; }
        .below-card a:hover { text-decoration: underline; }
        /* ========== 투두 컨테이너 ========== */
        .todo-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 28px 32px;
            width: 100%;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
            animation: fadeIn 0.35s ease;
        }
        .todo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
        .todo-header-left { display: flex; align-items: center; gap: 10px; }
        .todo-logo-badge { background: var(--btn-primary); color: var(--btn-primary-text); font-size: 13px; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
        .todo-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .btn-logout { padding: 7px 16px; background: var(--logout-bg); color: var(--logout-color); border: 1px solid var(--logout-border); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-logout:hover { opacity: 0.8; }
        .todo-input-row { display: flex; gap: 10px; margin-bottom: 16px; width: 100%; }
        .todo-input-row input { flex: 1; min-width: 0; padding: 13px 16px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 15px; color: var(--text-primary); background: var(--input-bg); outline: none; transition: all 0.2s; -webkit-appearance: none; }
        .todo-input-row input::placeholder { color: var(--text-secondary); }
        .todo-input-row input:focus { border-color: var(--input-border-focus); box-shadow: 0 0 0 3px rgba(10,102,194,0.12); }
        .btn-add { flex-shrink: 0; padding: 13px 22px; background: var(--btn-primary); color: var(--btn-primary-text); border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .btn-add:hover:not(:disabled) { background: var(--btn-primary-hover); }
        .btn-add:disabled { opacity: 0.6; cursor: not-allowed; }
        /* 필터 탭 */
        .filter-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 18px; border: 1px solid var(--tab-border); border-radius: 20px; background: transparent; font-size: 13px; font-weight: 600; color: var(--link-color); cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--tab-active-bg); color: var(--btn-primary-text); }
        .tab-btn:hover:not(.active) { background: var(--todo-item-hover); }
        /* 투두 리스트 */
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 460px; overflow-y: auto; padding-right: 2px; }
        .todo-list::-webkit-scrollbar { width: 4px; }
        .todo-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
        .todo-item {
            background: var(--todo-item-bg);
            border-radius: 10px;
            border: 1px solid var(--todo-item-border);
            transition: all 0.2s;
            animation: slideIn 0.25s ease;
            overflow: hidden;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
        .todo-item:hover { background: var(--todo-item-hover); border-color: var(--input-border-focus); }
        .todo-item.overdue {
            background: var(--overdue-bg) !important;
            border-color: var(--overdue-border) !important;
        }
        .todo-item.overdue:hover { filter: brightness(0.97); }
        .todo-item-main { display: flex; align-items: center; gap: 12px; padding: 13px 15px; }
        .todo-item.completed { opacity: 0.65; }
        .todo-checkbox { width: 20px; height: 20px; min-width: 20px; border: 2px solid var(--input-border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: var(--input-bg); }
        .todo-checkbox.checked { background: var(--btn-primary); border-color: var(--btn-primary); }
        .todo-checkbox.checked::after { content: "✓"; color: white; font-size: 12px; font-weight: 700; }
        .todo-content { flex: 1; min-width: 0; }
        .todo-text { font-size: 14px; color: var(--text-primary); word-break: break-word; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-secondary); }
        .todo-item.overdue .todo-text { color: var(--overdue-text); }
        /* 마감기한 칩 */
        .deadline-chip {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 4px;
            font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 20px;
            background: var(--deadline-chip-bg);
            color: var(--deadline-chip-color);
        }
        .deadline-chip.overdue {
            background: var(--overdue-bg);
            color: var(--overdue-text);
            border: 1px solid var(--overdue-border);
        }
        .todo-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .btn-deadline {
            padding: 4px 8px; background: none;
            border: 1px solid var(--todo-item-border);
            border-radius: 4px; color: var(--text-secondary);
            font-size: 13px; cursor: pointer; transition: all 0.2s;
            line-height: 1;
        }
        .btn-deadline:hover { border-color: var(--input-border-focus); color: var(--link-color); }
        .btn-deadline.active { border-color: var(--input-border-focus); color: var(--link-color); background: var(--deadline-chip-bg); }
        .btn-delete { padding: 4px 10px; background: none; border: 1px solid var(--todo-item-border); border-radius: 4px; color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-delete:hover { border-color: var(--logout-border); color: var(--logout-color); background: var(--logout-bg); }
        /* 마감기한 picker 패널 */
        .deadline-panel {
            display: none;
            padding: 12px 15px 14px;
            background: var(--deadline-picker-bg);
            border-top: 1px solid var(--todo-item-border);
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .deadline-panel.open { display: flex; }
        .deadline-panel label { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
        .deadline-panel input[type="datetime-local"] {
            flex: 1; min-width: 180px;
            padding: 7px 10px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--input-bg);
            outline: none;
        }
        .deadline-panel input[type="datetime-local"]:focus { border-color: var(--input-border-focus); }
        .btn-deadline-save { padding: 7px 14px; background: var(--btn-primary); color: var(--btn-primary-text); border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .btn-deadline-save:hover { background: var(--btn-primary-hover); }
        .btn-deadline-remove { padding: 7px 10px; background: none; border: 1px solid var(--logout-border); color: var(--logout-color); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .btn-deadline-remove:hover { background: var(--logout-bg); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state .emoji { font-size: 44px; margin-bottom: 10px; }
        .empty-state p { font-size: 14px; }
        /* 타임라인 뷰 */
        #timeline-view { display: none; }
        #timeline-view.active { display: block; }
        .timeline-empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .timeline-empty .emoji { font-size: 44px; margin-bottom: 10px; }
        .timeline-group { margin-bottom: 8px; }
        .timeline-date-label {
            font-size: 12px; font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 28px;
        }
        .timeline-date-label.today-label { color: var(--timeline-dot-today); }
        .timeline-date-label.overdue-label { color: var(--timeline-dot-overdue); }
        .timeline-item {
            display: flex;
            gap: 0;
            position: relative;
            padding-bottom: 12px;
        }
        .timeline-item:not(:last-child) .timeline-line-col::after {
            content: '';
            position: absolute;
            left: 9px; top: 20px;
            width: 2px;
            bottom: 0;
            background: var(--timeline-line);
        }
        .timeline-line-col {
            width: 20px; min-width: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timeline-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
            border: 2px solid var(--card-bg);
            box-shadow: 0 0 0 2px var(--timeline-dot);
            background: var(--timeline-dot);
            z-index: 1;
        }
        .timeline-dot.overdue { background: var(--timeline-dot-overdue); box-shadow: 0 0 0 2px var(--timeline-dot-overdue); }
        .timeline-dot.today { background: var(--timeline-dot-today); box-shadow: 0 0 0 2px var(--timeline-dot-today); }
        .timeline-dot.done { background: var(--timeline-dot-done); box-shadow: 0 0 0 2px var(--timeline-dot-done); }
        .timeline-card {
            flex: 1; min-width: 0;
            margin-left: 10px;
            background: var(--todo-item-bg);
            border: 1px solid var(--todo-item-border);
            border-radius: 8px;
            padding: 10px 14px;
            transition: all 0.2s;
        }
        .timeline-card:hover { background: var(--todo-item-hover); }
        .timeline-card.overdue { background: var(--overdue-bg); border-color: var(--overdue-border); }
        .timeline-card.done { opacity: 0.6; }
        .timeline-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .timeline-card-text { font-size: 14px; color: var(--text-primary); font-weight: 500; flex: 1; min-width: 0; word-break: break-word; }
        .timeline-card.overdue .timeline-card-text { color: var(--overdue-text); }
        .timeline-card.done .timeline-card-text { text-decoration: line-through; color: var(--text-secondary); }
        .timeline-time {
            font-size: 11px; color: var(--text-secondary);
            white-space: nowrap; flex-shrink: 0;
            margin-top: 2px;
        }
        .timeline-card.overdue .timeline-time { color: var(--overdue-text); opacity: 0.8; }
        .timeline-badge {
            display: inline-block; margin-top: 6px;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
        }
        .timeline-badge.overdue-badge { background: var(--overdue-border); color: white; }
        .timeline-badge.today-badge { background: var(--timeline-dot-today); color: white; }
        .timeline-badge.done-badge { background: var(--timeline-dot-done); color: white; }
        /* 스피너 */
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--spinner-color); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* 반응형 */
        @media (max-width: 540px) {
            body { padding: 16px 12px; justify-content: flex-start; padding-top: 64px; }
            .section, #section-todo { max-width: 100%; }
            .card { padding: 28px 20px 24px; }
            .todo-container { padding: 22px 16px; }
            .card-title { font-size: 24px; }
            .email-row { flex-direction: column; }
            .btn-verify { width: 100%; padding: 13px; text-align: center; }
            .todo-input-row { flex-direction: column; }
            .btn-add { width: 100%; padding: 13px; }
            .theme-toggle { top: 12px; right: 12px; width: 40px; height: 40px; font-size: 18px; }
            .deadline-panel { flex-direction: column; align-items: stretch; }
            .deadline-panel input[type="datetime-local"] { min-width: unset; width: 100%; }
        }
    </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>

<!-- 로그인 -->
<div id="section-login" class="section active">
    <div class="logo-wrap"><div class="logo"><span class="logo-text">Todo</span><span class="logo-badge">✓</span></div></div>
    <div class="card">
        <div class="card-title">로그인하세요</div>
        <div class="card-subtitle">할 일 목록으로 하루를 관리해보세요</div>
        <div id="login-alert" class="alert alert-error"></div>
        <div class="input-wrap"><input type="text" id="login-username" placeholder="아이디"></div>
        <div class="input-wrap">
            <input type="password" id="login-password" placeholder="비밀번호">
            <button class="pw-toggle" onclick="togglePw('login-password', this)">표시</button>
        </div>
        <a class="link-blue" onclick="showSection('section-reset')">비밀번호를 잊으셨나요?</a>
        <button class="btn-main" id="btn-login" onclick="login()">로그인</button>
    </div>
    <div class="below-card">아직 계정이 없으신가요? &nbsp;<a onclick="showSection('section-signup')">회원 가입</a></div>
</div>

<!-- 회원가입 -->
<div id="section-signup" class="section">
    <div class="logo-wrap"><div class="logo"><span class="logo-text">Todo</span><span class="logo-badge">✓</span></div></div>
    <div class="card">
        <div class="card-title">회원가입</div>
        <div class="card-subtitle">지금 가입하고 투두리스트를 시작하세요</div>
        <div id="signup-alert" class="alert alert-error"></div>
        <div id="signup-success" class="alert alert-success"></div>
        <div class="input-wrap"><input type="text" id="signup-username" placeholder="아이디"></div>
        <div class="input-wrap">
            <input type="password" id="signup-password" placeholder="비밀번호">
            <button class="pw-toggle" onclick="togglePw('signup-password', this)">표시</button>
        </div>
        <div class="email-row">
            <div class="input-wrap"><input type="email" id="signup-email" placeholder="이메일"></div>
            <button class="btn-verify" id="btn-request-code" onclick="requestSignupCode()">인증 요청</button>
        </div>
        <div class="input-wrap"><input type="text" id="signup-code" placeholder="6자리 인증번호" maxlength="6"></div>
        <button class="btn-main" id="btn-signup" onclick="signup()">인증 및 가입 완료</button>
    </div>
    <div class="below-card">이미 계정이 있나요? &nbsp;<a onclick="showSection('section-login')">로그인 하러가기</a></div>
</div>

<!-- 비밀번호 재설정 -->
<div id="section-reset" class="section">
    <div class="logo-wrap"><div class="logo"><span class="logo-text">Todo</span><span class="logo-badge">✓</span></div></div>
    <div class="card">
        <div class="card-title">비밀번호 재설정</div>
        <div class="card-subtitle">가입할 때 사용한 이메일로 인증을 진행해 주세요</div>
        <div id="reset-alert" class="alert alert-error"></div>
        <div id="reset-success" class="alert alert-success"></div>
        <div class="email-row">
            <div class="input-wrap"><input type="email" id="reset-email" placeholder="가입한 이메일"></div>
            <button class="btn-verify" id="btn-request-reset-code" onclick="requestResetCode()">인증 요청</button>
        </div>
        <div class="input-wrap"><input type="text" id="reset-code" placeholder="6자리 인증번호" maxlength="6"></div>
        <div class="input-wrap">
            <input type="password" id="reset-new-password" placeholder="새 비밀번호">
            <button class="pw-toggle" onclick="togglePw('reset-new-password', this)">표시</button>
        </div>
        <button class="btn-main" id="btn-reset" onclick="resetPassword()">비밀번호 변경</button>
    </div>
    <div class="below-card"><a onclick="showSection('section-login')">← 로그인으로 돌아가기</a></div>
</div>

<!-- 투두 섹션 -->
<div id="section-todo" class="section">
    <div class="todo-container">
        <div class="todo-header">
            <div class="todo-header-left">
                <span class="todo-logo-badge">✓</span>
                <span class="todo-title">나의 투두리스트</span>
            </div>
            <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
        <div class="todo-input-row">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
            <button class="btn-add" id="btn-add-todo" onclick="addTodo()">+ 등록</button>
        </div>
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterTodos('all', this)">전체</button>
            <button class="tab-btn" onclick="filterTodos('active', this)">할 일</button>
            <button class="tab-btn" onclick="filterTodos('completed', this)">완료</button>
            <button class="tab-btn" onclick="filterTodos('overdue', this)">마감초과</button>
            <button class="tab-btn" id="tab-timeline" onclick="switchToTimeline(this)">타임라인</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>
        <div id="timeline-view"></div>
    </div>
</div>

<script>
    const API_BASE = "https://todolist-ezpr.onrender.com";
    let currentFilter = 'all';
    let todos = [];
    let isTimelineMode = false;

    // =====================
    // 다크모드
    // =====================
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-btn').textContent = isDark ? '🌑' : '☀️';
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    (function () {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌑';
        });
    })();

    function togglePw(id, btn) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
        btn.textContent = el.type === 'password' ? '표시' : '숨기기';
    }
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function showAlert(id, msg, type = 'error') {
        const el = document.getElementById(id);
        el.className = `alert alert-${type}`;
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    function setLoading(btnId, loading, text) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.innerHTML = loading ? `<span class="spinner"></span> 처리중...` : text;
    }

    document.addEventListener('DOMContentLoaded', () => {
        ['login-username', 'login-password'].forEach(id =>
            document.getElementById(id)?.addEventListener('keydown', e => e.key === 'Enter' && login())
        );
        ['signup-username', 'signup-password', 'signup-code'].forEach(id =>
            document.getElementById(id)?.addEventListener('keydown', e => e.key === 'Enter' && signup())
        );
        document.getElementById('signup-email')?.addEventListener('keydown', e => e.key === 'Enter' && requestSignupCode());
        ['reset-code', 'reset-new-password'].forEach(id =>
            document.getElementById(id)?.addEventListener('keydown', e => e.key === 'Enter' && resetPassword())
        );
        document.getElementById('reset-email')?.addEventListener('keydown', e => e.key === 'Enter' && requestResetCode());
        document.getElementById('todo-input')?.addEventListener('keydown', e => e.key === 'Enter' && addTodo());
    });

    // =====================
    // 로그인 / 회원가입 / 재설정
    // =====================
    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!username || !password) { showAlert('login-alert', '아이디와 비밀번호를 입력해주세요.'); return; }
        setLoading('btn-login', true, '로그인');
        try {
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) { showAlert('login-alert', data.detail || '로그인 실패'); return; }
            localStorage.setItem('token', data.access_token);
            showSection('section-todo');
            loadTodos();
        } catch { showAlert('login-alert', '서버 오류가 발생했습니다.'); }
        finally { setLoading('btn-login', false, '로그인'); }
    }

    async function requestSignupCode() {
        const email = document.getElementById('signup-email').value.trim();
        if (!email) { showAlert('signup-alert', '이메일을 입력해주세요.'); return; }
        const btn = document.getElementById('btn-request-code');
        btn.disabled = true; btn.textContent = '발송중...';
        try {
            const res = await fetch(`${API_BASE}/request-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (!res.ok) { showAlert('signup-alert', data.detail || '요청 실패'); btn.disabled = false; btn.textContent = '인증 요청'; return; }
            showAlert('signup-success', '인증번호가 발송되었습니다!', 'success');
            startCooldown(btn, 180);
        } catch { showAlert('signup-alert', '서버 오류'); btn.disabled = false; btn.textContent = '인증 요청'; }
    }

    async function signup() {
        const username = document.getElementById('signup-username').value.trim();
        const password = document.getElementById('signup-password').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const code = document.getElementById('signup-code').value.trim();
        if (!username || !password || !email || !code) { showAlert('signup-alert', '모든 항목을 입력해주세요.'); return; }
        setLoading('btn-signup', true, '인증 및 가입 완료');
        try {
            const res = await fetch(`${API_BASE}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email, code })
            });
            const data = await res.json();
            if (!res.ok) { showAlert('signup-alert', data.detail || '회원가입 실패'); return; }
            showAlert('signup-success', '회원가입 성공! 로그인 해주세요.', 'success');
            setTimeout(() => showSection('section-login'), 1500);
        } catch { showAlert('signup-alert', '서버 오류가 발생했습니다.'); }
        finally { setLoading('btn-signup', false, '인증 및 가입 완료'); }
    }

    async function requestResetCode() {
        const email = document.getElementById('reset-email').value.trim();
        if (!email) { showAlert('reset-alert', '이메일을 입력해주세요.'); return; }
        const btn = document.getElementById('btn-request-reset-code');
        btn.disabled = true; btn.textContent = '발송중...';
        try {
            const res = await fetch(`${API_BASE}/request-reset-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (!res.ok) { showAlert('reset-alert', data.detail || '요청 실패'); btn.disabled = false; btn.textContent = '인증 요청'; return; }
            showAlert('reset-success', '인증번호가 발송되었습니다!', 'success');
            startCooldown(btn, 180);
        } catch { showAlert('reset-alert', '서버 오류'); btn.disabled = false; btn.textContent = '인증 요청'; }
    }

    async function resetPassword() {
        const email = document.getElementById('reset-email').value.trim();
        const code = document.getElementById('reset-code').value.trim();
        const new_password = document.getElementById('reset-new-password').value.trim();
        if (!email || !code || !new_password) { showAlert('reset-alert', '모든 항목을 입력해주세요.'); return; }
        setLoading('btn-reset', true, '비밀번호 변경');
        try {
            const res = await fetch(`${API_BASE}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code, new_password })
            });
            const data = await res.json();
            if (!res.ok) { showAlert('reset-alert', data.detail || '재설정 실패'); return; }
            showAlert('reset-success', '비밀번호가 변경되었습니다!', 'success');
            setTimeout(() => showSection('section-login'), 1500);
        } catch { showAlert('reset-alert', '서버 오류가 발생했습니다.'); }
        finally { setLoading('btn-reset', false, '비밀번호 변경'); }
    }

    function startCooldown(btn, seconds) {
        let count = seconds;
        const timer = setInterval(() => {
            btn.textContent = `재요청 (${count}s)`;
            count--;
            if (count < 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '인증 요청'; }
        }, 1000);
    }

    // =====================
    // 투두 CRUD
    // =====================
    async function loadTodos() {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) { logout(); return; }
            todos = await res.json();
            render();
        } catch (e) { console.error(e); }
    }

    async function addTodo() {
        const input = document.getElementById('todo-input');
        const content = input.value.trim();
        if (!content) { input.style.borderColor = '#cc1016'; setTimeout(() => input.style.borderColor = '', 1000); return; }
        const btn = document.getElementById('btn-add-todo');
        if (btn.disabled) return;
        btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`;
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ content })
            });
            if (res.status === 401) { logout(); return; }
            const newTodo = await res.json();
            todos.push({ id: newTodo.id, content: newTodo.content, completed: false, deadline: null });
            input.value = '';
            render();
        } catch (e) { console.error(e); }
        finally { btn.disabled = false; btn.innerHTML = '+ 등록'; }
    }

    async function toggleTodo(id) {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos/${id}/toggle`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) return;
            const updated = await res.json();
            const todo = todos.find(t => t.id === id);
            if (todo) todo.completed = updated.completed;
            render();
        } catch (e) { console.error(e); }
    }

    async function deleteTodo(id) {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) return;
            todos = todos.filter(t => t.id !== id);
            render();
        } catch (e) { console.error(e); }
    }

    // =====================
    // 마감기한
    // =====================
    function toggleDeadlinePanel(id) {
        const panel = document.getElementById(`deadline-panel-${id}`);
        const btn = document.getElementById(`btn-deadline-${id}`);
        if (panel.classList.contains('open')) {
            panel.classList.remove('open');
            btn.classList.remove('active');
        } else {
            panel.classList.add('open');
            btn.classList.add('active');
            const todo = todos.find(t => t.id === id);
            if (todo?.deadline) {
                // ✅ 서버에서 받은 ISO 문자열을 로컬 시간으로 변환해서 input에 표시
                const dt = new Date(todo.deadline);
                const local = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000)
                    .toISOString().slice(0, 16);
                document.getElementById(`deadline-input-${id}`).value = local;
            }
        }
    }

    async function saveDeadline(id) {
        const input = document.getElementById(`deadline-input-${id}`);
        const val = input.value; // "2024-01-01T15:00" 형식 (로컬 시간)
        if (!val) { alert('날짜와 시간을 선택해주세요.'); return; }
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos/${id}/deadline`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                // ✅ 핵심 수정: toISOString() 제거 → 로컬 시간 문자열 그대로 전송
                body: JSON.stringify({ deadline: val })
            });
            if (!res.ok) return;
            const updated = await res.json();
            const todo = todos.find(t => t.id === id);
            if (todo) todo.deadline = updated.deadline;
            render();
        } catch (e) { console.error(e); }
    }

    async function removeDeadline(id) {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_BASE}/todos/${id}/deadline`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ deadline: null })
            });
            if (!res.ok) return;
            const todo = todos.find(t => t.id === id);
            if (todo) todo.deadline = null;
            render();
        } catch (e) { console.error(e); }
    }

    // =====================
    // 필터 / 뷰 전환
    // =====================
    function filterTodos(filter, btn) {
        isTimelineMode = false;
        currentFilter = filter;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('todo-list').style.display = '';
        document.getElementById('timeline-view').classList.remove('active');
        render();
    }

    function switchToTimeline(btn) {
        isTimelineMode = true;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('todo-list').style.display = 'none';
        document.getElementById('timeline-view').classList.add('active');
        renderTimeline();
    }

    function isOverdue(todo) {
        if (!todo.deadline || todo.completed) return false;
        return new Date(todo.deadline) < new Date();
    }

    function formatDeadline(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        const isOD = d < new Date();
        const month = d.getMonth() + 1;
        const day = d.getDate();
        const hour = d.getHours().toString().padStart(2, '0');
        const min = d.getMinutes().toString().padStart(2, '0');
        return `${isOD ? '⚠️ ' : '⏰ '}${month}/${day} ${hour}:${min}`;
    }

    // =====================
    // 리스트 렌더링
    // =====================
    function render() {
        if (isTimelineMode) { renderTimeline(); return; }
        const list = document.getElementById('todo-list');
        let filtered = todos;
        if (currentFilter === 'active')    filtered = todos.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);
        if (currentFilter === 'overdue')   filtered = todos.filter(t => isOverdue(t));
        if (filtered.length === 0) {
            const msgs  = { all: '할 일을 추가해보세요!', active: '할 일이 없어요!', completed: '완료된 항목이 없어요!', overdue: '마감 초과된 항목이 없어요! 🎉' };
            const emojis = { all: '📋', active: '✨', completed: '🎉', overdue: '✅' };
            list.innerHTML = `<div class="empty-state"><div class="emoji">${emojis[currentFilter] || '📋'}</div><p>${msgs[currentFilter] || '할 일을 추가해보세요!'}</p></div>`;
            return;
        }
        list.innerHTML = filtered.map(t => {
            const overdue = isOverdue(t);
            const chipHtml = t.deadline
                ? `<span class="deadline-chip ${overdue ? 'overdue' : ''}">${formatDeadline(t.deadline)}</span>`
                : '';
            return `
            <li class="todo-item ${t.completed ? 'completed' : ''} ${overdue ? 'overdue' : ''}">
                <div class="todo-item-main">
                    <div class="todo-checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(t.content)}</div>
                        ${chipHtml}
                    </div>
                    <div class="todo-actions">
                        <button class="btn-deadline ${t.deadline ? 'active' : ''}" id="btn-deadline-${t.id}" onclick="toggleDeadlinePanel(${t.id})">📅</button>
                        <button class="btn-delete" onclick="deleteTodo(${t.id})">삭제</button>
                    </div>
                </div>
                <div class="deadline-panel" id="deadline-panel-${t.id}">
                    <label>마감기한</label>
                    <input type="datetime-local" id="deadline-input-${t.id}">
                    <button class="btn-deadline-save" onclick="saveDeadline(${t.id})">저장</button>
                    ${t.deadline ? `<button class="btn-deadline-remove" onclick="removeDeadline(${t.id})">제거</button>` : ''}
                </div>
            </li>`;
        }).join('');
    }

    // =====================
    // 타임라인 렌더링
    // =====================
    function renderTimeline() {
        const view = document.getElementById('timeline-view');
        const todosWithDeadline = [...todos]
            .filter(t => t.deadline)
            .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
        if (todosWithDeadline.length === 0) {
            view.innerHTML = `<div class="timeline-empty"><div class="emoji">📅</div><p>마감기한이 설정된 할 일이 없어요!<br>투두에 📅 버튼으로 마감기한을 추가해보세요.</p></div>`;
            return;
        }
        const now = new Date();
        const todayStr = now.toDateString();
        const groups = {};
        todosWithDeadline.forEach(t => {
            const key = new Date(t.deadline).toDateString();
            if (!groups[key]) groups[key] = [];
            groups[key].push(t);
        });
        let html = '';
        Object.entries(groups).forEach(([dateStr, items]) => {
            const groupDate = new Date(dateStr);
            const isPast = groupDate < new Date(now.toDateString());
            const isToday = dateStr === todayStr;
            const labelClass = isPast ? 'overdue-label' : (isToday ? 'today-label' : '');
            const dateLabel = isToday
                ? '오늘'
                : isPast
                    ? `${groupDate.getMonth() + 1}/${groupDate.getDate()} (지남)`
                    : `${groupDate.getMonth() + 1}월 ${groupDate.getDate()}일`;
            html += `<div class="timeline-group">
                <div class="timeline-date-label ${labelClass}">${dateLabel}</div>`;
            items.forEach(t => {
                const d = new Date(t.deadline);
                const timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                const overdue = isOverdue(t);
                const dotClass  = t.completed ? 'done' : (overdue ? 'overdue' : (isToday ? 'today' : ''));
                const cardClass = t.completed ? 'done' : (overdue ? 'overdue' : '');
                let badge = '';
                if (t.completed)   badge = `<span class="timeline-badge done-badge">✓ 완료</span>`;
                else if (overdue)  badge = `<span class="timeline-badge overdue-badge">⚠️ 마감 초과</span>`;
                else if (isToday)  badge = `<span class="timeline-badge today-badge">오늘 마감</span>`;
                html += `
                <div class="timeline-item">
                    <div class="timeline-line-col">
                        <div class="timeline-dot ${dotClass}"></div>
                    </div>
                    <div class="timeline-card ${cardClass}">
                        <div class="timeline-card-header">
                            <span class="timeline-card-text">${escapeHtml(t.content)}</span>
                            <span class="timeline-time">${timeStr}</span>
                        </div>
                        ${badge}
                    </div>
                </div>`;
            });
            html += `</div>`;
        });
        view.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function logout() {
        localStorage.removeItem('token');
        todos = [];
        showSection('section-login');
    }

    window.onload = () => {
        const token = localStorage.getItem('token');
        if (token) { showSection('section-todo'); loadTodos(); }
    };
</script>
</body>
</html>
